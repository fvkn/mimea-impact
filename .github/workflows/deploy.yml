name: Build & Deploy to Infomaniak

# Builds the site and uploads it to Infomaniak via FTPS on every push to main.
# One-time setup: add these repository secrets (Settings -> Secrets and variables -> Actions):
#   FTP_HOST        e.g. sl7x26.ftp.infomaniak.com
#   FTP_USERNAME    e.g. sl7x26_fvkn
#   FTP_PASSWORD    the FTP password (set/reset in Infomaniak: Hosting -> FTP/SSH)
#   FTP_SERVER_DIR  target folder, e.g. /sites/mimea-impact.ch/  (must end with a slash)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & build
        working-directory: mimea-site
        run: |
          npm ci
          npm run build

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./mimea-site/dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # Never touch Infomaniak's thumbnail cache or any VCS metadata on the server
          exclude: |
            **/.tmb/**
            **/.git*
            **/.git*/**
