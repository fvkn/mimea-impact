name: Build & Deploy to Infomaniak

# Builds the site and uploads it to Infomaniak via SFTP (SSH, port 22) on every push to main.
# One-time setup: add these repository secrets (Settings -> Secrets and variables -> Actions):
#   FTP_HOST        e.g. sl7x26.ftp.infomaniak.com
#   FTP_USERNAME    e.g. sl7x26_fvkn
#   FTP_PASSWORD    the FTP password (set/reset in Infomaniak: Hosting -> FTP/SSH)
#   FTP_SERVER_DIR  target folder, e.g. /sites/mimea-impact.ch/  (must end with a slash)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & build
        working-directory: mimea-site
        run: |
          npm ci
          npm run build

      - name: Deploy via SFTP
        env:
          SFTP_HOST: ${{ secrets.FTP_HOST }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
          SFTP_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          # The SFTP user lands in the account home, so use a path relative to it
          # (strip any leading slash from the configured server dir).
          DIR="${SFTP_DIR#/}"
          # Infomaniak uses SFTP (SSH) on port 22. Upload-only mirror (no --delete)
          # so nothing on the server is removed; existing files are overwritten.
          lftp -c "
            set sftp:auto-confirm yes;
            set net:max-retries 2;
            open -u '$SFTP_USER','$SFTP_PASS' sftp://$SFTP_HOST:22;
            pwd;
            mirror --reverse --verbose --exclude '\.tmb/' ./mimea-site/dist/ '$DIR';
          "
